apiVersion: apps/v1
kind: Deployment
metadata:
  name: auction-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auction
  template:
    metadata:
      labels:
        app: auction
    spec:
      containers:
        - name: auction
          image: sar0234/auction-app
          ports:
            - containerPort: 8080