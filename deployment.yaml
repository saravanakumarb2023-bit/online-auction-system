apiVersion: apps/v1
kind: Deployment
metadata:
  name: auction-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auction
  template:
    metadata:
      labels:
        app: auction
    spec:
      containers:
        - name: auction-container
          image: sar0234/auction-app:latest
          imagePullPolicy: Always

          # 🔥 Keeps container alive (since no web server)
          command: ["sh", "-c", "while true; do sleep 30; done"]

          ports:
            - containerPort: 8080